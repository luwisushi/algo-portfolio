<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments | Louise Moreno</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-category="assignments">
    <main class="page-wrap">
        <header class="subpage-header">
            <div>
                <p class="hero-tag">Algorithm and Complexities</p>
                <h1>Assignments</h1>
                <p class="hero-text">Add and manage assignment entries for this subject.</p>
            </div>
            <a class="home-button" href="index.html">Go to Home</a>
        </header>

        <section class="entries-section">
            <div class="entries-header">
                <h2>Saved Assignments</h2>
                <button id="toggle-form-button" class="add-entry-toggle" type="button" aria-expanded="false" aria-controls="entry-section">Add Entry</button>
            </div>
            <div id="entries-list" class="entries-list"></div>
        </section>

        <section id="entry-section" class="entry-section" hidden>
            <form id="entry-form" class="entry-form">
                <label>
                    Title
                    <input id="title" name="title" type="text" placeholder="Enter assignment title" required>
                </label>

                <label>
                    Date
                    <input id="date" name="date" type="date" required>
                </label>

                <label>
                    Description
                    <textarea id="description" name="description" rows="4" placeholder="Write a short description" required></textarea>
                </label>

                <label>
                    Import Image
                    <input id="image" name="image" type="file" accept="image/*">
                </label>

                <div class="form-actions">
                    <button id="submit-button" type="submit">Add Entry</button>
                    <button id="cancel-edit" class="cancel-button" type="button" hidden>Cancel Edit</button>
                </div>
            </form>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
